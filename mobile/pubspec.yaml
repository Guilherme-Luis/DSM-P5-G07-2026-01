name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  jwt_decoder: ^2.0.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  mime: ^2.0.0
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/miniboxferreira.jpg"
  adaptive_icon_background: "#B9B9BF"
  adaptive_icon_foreground: "assets/logo/miniboxferreira.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/miniboxferreira.jpg
